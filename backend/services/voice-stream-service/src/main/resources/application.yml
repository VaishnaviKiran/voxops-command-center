server:
  port: ${PORT:8082}

spring:
  application:
    name: voice-stream-service

incident:
  service:
    base-url: ${INCIDENT_SERVICE_BASE_URL:http://localhost:8081}
    internal-token: ${VOXOPS_INTERNAL_SERVICE_TOKEN:local-dev-internal-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
