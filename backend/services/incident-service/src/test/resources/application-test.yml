spring:
  datasource:
    url: jdbc:h2:mem:voxops;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    open-in-view: false
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:test-data.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

voxops:
  security:
    jwt-secret: test-jwt-secret-change-me-test-jwt-secret-change-me
    token-ttl-minutes: 60
    internal-service-token: test-internal-token
  ai:
    provider: MOCK
  events:
    enabled: false
